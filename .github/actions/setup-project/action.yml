name: 'Setup Project'
description: 'Checks out the repository and optionally sets up Node.js with dependencies'

inputs:
  setup-node:
    description: 'If true, sets up Node.js and installs Yarn dependencies'
    required: false
    default: 'false'

runs:
  using: 'composite'
  steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 1

    - name: Setup Node.js
      if: inputs.setup-node == 'true'
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'yarn'

    - name: Install dependencies
      if: inputs.setup-node == 'true'
      shell: bash
      run: yarn install --frozen-lockfile
