name: PR Checks

on:
  pull_request:
    branches: ['main']

permissions: {}

jobs:
  format:
    name: Check Format
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Setup Project
        uses: ./.github/actions/setup-project
        with:
          setup-node: 'true'

      - name: Run Format Check
        run: yarn format

  lint:
    name: Check Lint
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Setup Project
        uses: ./.github/actions/setup-project
        with:
          setup-node: 'true'

      - name: Run Lint
        run: yarn lint

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Setup Project
        uses: ./.github/actions/setup-project
        with:
          setup-node: 'true'

      - name: Run Tests
        run: yarn test

  coverage:
    name: Check Coverage
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Setup Project
        uses: ./.github/actions/setup-project
        with:
          setup-node: 'true'

      - name: Run Coverage
        run: yarn test:coverage

      - uses: qltysh/qlty-action/coverage@v2
        with:
          token: ${{ secrets.QLTY_COVERAGE_TOKEN }}
          files: coverage/lcov.info
