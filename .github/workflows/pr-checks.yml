name: '[ci] pr checks'

on:
  pull_request:
    branches: ['main']

permissions: {}

jobs:
  format:
    name: '[ci] check format'
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Setup Project
        uses: ./.github/actions/setup-project
        with:
          setup-node: 'true'

      - name: Run Format Check
        run: yarn format

  lint:
    name: '[ci] check lint'
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Setup Project
        uses: ./.github/actions/setup-project
        with:
          setup-node: 'true'

      - name: Run Lint
        run: yarn lint

  test:
    name: '[ci] run tests'
    runs-on: ubuntu-latest
    steps:
      - name: Setup Project
        uses: ./.github/actions/setup-project
        with:
          setup-node: 'true'

      - name: Run Tests
        run: yarn test

  coverage:
    name: '[ci] check coverage'
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Setup Project
        uses: ./.github/actions/setup-project
        with:
          setup-node: 'true'

      - name: Run Coverage
        run: yarn test:coverage

      - uses: qltysh/qlty-action/coverage@a19242102d17e497f437d7466aa01b528537e899
        with:
          token: ${{ secrets.QLTY_COVERAGE_TOKEN }}
          files: tests/coverage/lcov.info
