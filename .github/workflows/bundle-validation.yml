name: '[build] bundle validation'

on:
  workflow_call:
  workflow_dispatch:
  pull_request:
    types:
      - ready_for_review
    paths-ignore:
      - 'po/**'
  push:
    branches:
      - main
    paths-ignore:
      - 'po/**'

permissions:
  contents: read

jobs:
  bundle-prod:
    name: '[build] validate prod bundle'
    runs-on: ubuntu-latest
    if: github.event_name != 'workflow_call'

    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:gnome-49
      options: --privileged

    steps:
      - name: Setup Project
        uses: andrepg/do-it/.github/actions/setup-project@main
        with:
          setup-node: 'true'

      - name: Check production build
        uses: flatpak/flatpak-github-actions/flatpak-builder@v6.6
        with:
          build-bundle: false
          manifest-path: flatpak/io.github.andrepg.Doit.json
          cache-key: flatpak-prod-${{ hashFiles('flatpak/io.github.andrepg.Doit.json') }}

      - name: Clean up credentials
        if: always()
        run: |
          rm -rf ~/.gnupg ~/.gnupg/private-keys-v1.d || true
          find ~/.gnupg -delete 2>/dev/null || true

  bundle-dev:
    name: '[build] validate dev bundle'
    runs-on: ubuntu-latest
    if: github.event_name != 'workflow_call'

    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:gnome-49
      options: --privileged

    steps:
      - name: Setup Project
        uses: andrepg/do-it/.github/actions/setup-project@main
        with:
          setup-node: 'true'

      - name: Check development build
        uses: flatpak/flatpak-github-actions/flatpak-builder@v6.6
        with:
          build-bundle: false
          manifest-path: flatpak/io.github.andrepg.Doit.Devel.json
          cache-key: flatpak-dev-${{ hashFiles('flatpak/io.github.andrepg.Doit.Devel.json') }}

      - name: Clean up credentials
        if: always()
        run: |
          rm -rf ~/.gnupg ~/.gnupg/private-keys-v1.d || true
          find ~/.gnupg -delete 2>/dev/null || true
