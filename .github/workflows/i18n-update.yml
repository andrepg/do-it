name: '[build] i18n update'

on:
  pull_request:
    branches: ['main']
    paths:
      - 'src/**'
      - 'package.json'
      - 'yarn.lock'

permissions:
  contents: write

jobs:
  i18n-update:
    name: '[build] update translations'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y ninja-build gjs python3-pip desktop-file-utils appstream libglib2.0-dev libgjs0g gettext

      - name: Clean up stale build directories
        run: rm -rf _build _build_pot

      - name: Install Meson
        run: pip3 install --break-system-packages meson==1.4.0

      - name: Setup Project
        uses: ./.github/actions/setup-project
        with:
          setup-node: 'true'

      - name: Update POT files
        run: yarn pot-generator

      - name: Commit changes
        uses: stefanzweifel/git-auto-commit-action@b863ae1933cb653a53c021fe36dbb774e1fb9403
        with:
          commit_message: 'lang: update pot files'
          file_pattern: 'po/*.po po/*.pot'
