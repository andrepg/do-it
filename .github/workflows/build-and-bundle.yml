name: '[build] flatpak validation'

on:
  workflow_call:
  workflow_dispatch:
  pull_request:
    types:
      - ready_for_review
    paths-ignore:
      - 'po/**'
  push:
    branches:
      - main
    paths-ignore:
      - 'po/**'

permissions:
  contents: read

jobs:
  i18n-update:
    name: '[build] update translations'
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:gnome-49

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Setup Project
        uses: ./.github/actions/setup-project
        with:
          setup-node: 'true'

      - name: Update POT files
        run: yarn i18n:update-pot

      - name: Commit changes
        uses: stefanzweifel/git-auto-commit-action@b863ae1933cb653a53c021fe36dbb774e1fb9403
        with:
          commit_message: 'lang: update pot files'
          file_pattern: 'po/*.po po/*.pot'

  bundle-prod:
    name: '[build] validate prod bundle'
    runs-on: ubuntu-latest

    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:gnome-49
      options: --privileged

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Check production build
        uses: flatpak/flatpak-github-actions/flatpak-builder@v6.6
        with:
          build-bundle: false
          manifest-path: flatpak/io.github.andrepg.Doit.json
          cache-key: flatpak-${{ github.ref }}

  bundle-dev:
    name: '[build] validate dev bundle'
    runs-on: ubuntu-latest

    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:gnome-49
      options: --privileged

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Check development build
        uses: flatpak/flatpak-github-actions/flatpak-builder@v6.6
        with:
          build-bundle: false
          manifest-path: flatpak/io.github.andrepg.Doit.Devel.json
          cache-key: flatpak-${{ github.ref }}
