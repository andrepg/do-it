name: '[build] flatpak bundle'

on:
  push:
    tags: ['*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Git tag to build and release'
        required: true
        type: string

permissions:
  contents: write
  pull-requests: read

env:
  RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}
  FLATPAK_NAME: io.github.andrepg.Doit

jobs:
  flatpak-validation:
    uses: ./.github/workflows/bundle-validation.yml

  flatpak-bundle:
    name: '[build] create flatpak bundle'
    runs-on: ubuntu-latest
    needs: flatpak-validation

    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:gnome-49
      options: --privileged

    steps:
      - name: Setup Project
        uses: andrepg/do-it/.github/actions/setup-project@v2.0.9

      - name: Setup GPG
        run: |
          echo "${{ secrets.FLATPAK_GPG_KEY }}" | gpg --batch --yes --import
          GPG_KEY_ID=$(gpg --list-secret-keys --keyid-format LONG | grep -oP 'sec\s+\w+/\K\w+' | head -1)
          echo "GPG_KEY_ID=$GPG_KEY_ID" >> $GITHUB_ENV

      - name: Build Flatpak bundle
        uses: flatpak/flatpak-github-actions/flatpak-builder@v6.6
        with:
          build-bundle: true
          upload-artifact: false
          manifest-path: flatpak/io.github.andrepg.Doit.json
          bundle: ${{ env.FLATPAK_NAME }}-latest.flatpak
          cache-key: flatpak-prod-${{ hashFiles('flatpak/generated-sources.json') }}
          gpg-sign: ${{ env.GPG_KEY_ID }}

      - name: Generate GPG detached signature
        run: |
          echo "${{ secrets.FLATPAK_GPG_KEY }}" | gpg --batch --yes --import --allow-secret-key-import
          gpg --batch --yes --armor --detach-sign \
            --local-user "$GPG_KEY_ID" \
            "${{ env.FLATPAK_NAME }}-latest.flatpak"

      - name: Clean up GPG keys
        if: always()
        run: |
          gpg --batch --yes --delete-secret-keys "$GPG_KEY_ID" || true
          gpg --batch --yes --delete-keys "$GPG_KEY_ID" || true
          rm -rf ~/.gnupg

      - name: Generate flatpakref
        run: |
          # Import separate public key for distribution (not the signing key)
          gpg --batch --yes --import flatpak/io.github.andrepg.Doit-latest.pub

          # Filter by email to get specific key ID (short form for reliable export)
          DIST_KEY_ID=$(gpg --list-public-keys --with-colons "andrepg@users.noreply.github.com" 2>/dev/null | grep "^pub" | cut -d: -f5)

          # Validate key ID was extracted
          if [ -z "$DIST_KEY_ID" ]; then
            echo "ERROR: No key found for andrepg@users.noreply.github.com"
            exit 1
          fi

          # Export as BINARY (no --armor!), then base64 encode
          GPG_PUB_KEY=$(gpg --export "$DIST_KEY_ID" | base64 -w0)
                    
          # Validate base64 output is not empty
          if [ -z "$GPG_PUB_KEY" ]; then
            echo "ERROR: Failed to export or encode GPG key"
            exit 1
          fi

          # Generate flatpakref with base64-encoded key
          cat << FLATPAKREF > "${{ env.FLATPAK_NAME }}-latest.flatpakref"
          [Flatpak Ref]
          Title=Do It
          Name=${{ env.FLATPAK_NAME }}
          Branch=main
          Url=https://github.com/${{ github.repository }}/releases/download/${{ env.RELEASE_TAG }}/${{ env.FLATPAK_NAME }}-latest.flatpak
          IsRuntime=False
          GPGKey=$GPG_PUB_KEY
          FLATPAKREF

      - name: Verify flatpakref GPGKey format
        run: |
          # Use robust grep without anchor for INI file format
          GPG_KEY_VAL=$(grep "GPGKey=" "${{ env.FLATPAK_NAME }}-latest.flatpakref" | cut -d= -f2)
          if ! echo "$GPG_KEY_VAL" | base64 -d >/dev/null 2>&1; then
            echo "ERROR: GPGKey is not valid base64"
            exit 1
          fi
          echo "Verified: GPGKey is valid base64"

      - name: Upload bundle to release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          tag_name: ${{ env.RELEASE_TAG }}
          files: |
            ${{ env.FLATPAK_NAME }}-latest.flatpak
            ${{ env.FLATPAK_NAME }}-latest.flatpak.asc
            ${{ env.FLATPAK_NAME }}-latest.flatpakref
            flatpak/${{ env.FLATPAK_NAME }}-latest.pub
