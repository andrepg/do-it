name: '[build] flatpak bundle'

on:
  push:
    tags: ['*']

permissions: {}

jobs:
  flatpak-validation:
    uses: ./.github/workflows/build-and-bundle.yml

  flatpak-bundle:
    runs-on: ubuntu-latest
    needs: flatpak-validation

    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:gnome-49
      options: --privileged

    steps:
      - name: Setup Project
        uses: ./.github/actions/setup-project

      - name: Build Flatpak bundle
        uses: flatpak/flatpak-github-actions/flatpak-builder@20eb46c470bdf05a29dc2262108f497d2d79199b
        with:
          build-bundle: true
          upload-artifact: true
          manifest-path: flatpak/io.github.andrepg.Doit.json
          bundle: io.github.andrepg.Doit.${{ github.ref_name }}.flatpak
          cache-key: flatpak-release-${{ github.ref_name }}

      - name: Upload bundle to release
        uses: softprops/action-gh-release@v2
        if: github.ref_type == 'tag'
        with:
          draft: false
          tag_name: ${{ github.ref_name }}
          files: io.github.andrepg.Doit-${{ github.ref_name }}.flatpak
