name: '[build] flatpak bundle'

on:
  push:
    tags: ['*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Git tag to build and release'
        required: true
        type: string

permissions:
  contents: write
  pull-requests: read

env:
  RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}

jobs:
  flatpak-validation:
    uses: ./.github/workflows/flatpak-bundle-validation.yml

  flatpak-bundle:
    name: '[build] create flatpak bundle'
    runs-on: ubuntu-latest
    needs: flatpak-validation

    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:gnome-49
      options: --privileged

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Setup Project
        uses: ./.github/actions/setup-project

      - name: Build Flatpak bundle
        uses: flatpak/flatpak-github-actions/flatpak-builder@v6.6
        with:
          build-bundle: true
          upload-artifact: false
          manifest-path: flatpak/io.github.andrepg.Doit.json
          bundle: io.github.andrepg.Doit-${{ env.RELEASE_TAG }}.flatpak
          cache-key: flatpak-prod-${{ hashFiles('flatpak/io.github.andrepg.Doit.json') }}

      - name: Upload bundle to release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          tag_name: ${{ env.RELEASE_TAG }}
          files: io.github.andrepg.Doit-${{ env.RELEASE_TAG }}.flatpak
